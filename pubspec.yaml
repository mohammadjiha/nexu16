name: nexus
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  go_router: ^17.2.3
  firebase_storage: ^13.4.2
  firebase_remote_config: ^6.5.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  sizer: ^3.1.3
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  youtube_player_flutter: ^9.1.3
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  google_generative_ai: ^0.4.7
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  share_plus: ^12.0.2
  health: ^13.3.1
  permission_handler: ^12.0.3
  flutter_blue_plus: ^1.14.0
  camera: ^0.12.0+1
  google_mlkit_pose_detection: ^0.14.1
  path_provider: ^2.1.5
  timeago: ^3.7.1
  pdf: ^3.12.0
  printing: ^5.14.3
  firebase_messaging: ^16.3.0
  firebase_crashlytics: ^5.0.2
  firebase_app_check: ^0.4.4+2
  cloud_functions: ^6.3.2
  flutter_stripe: ^13.0.0

  archive: ^3.6.1
  excel: ^4.0.6
  uuid: any
  device_info_plus: ^11.3.0
  package_info_plus: ^9.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  device_preview: ^1.3.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  mockito: ^5.4.4
  build_runner: ^2.4.15
  firebase_auth_mocks: ^0.15.1
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - assets/90_detailed_diet_plans.json

dependency_overrides:
  device_info_plus: 11.3.0

# ── App Launcher Icons ────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/nexus_logo.png"
  adaptive_icon_background: "#1C1C1E"
  adaptive_icon_foreground: "assets/images/nexus_logo.png"
  min_sdk_android: 21
  web:
    generate: false

# ── Native Splash Screen ──────────────────────────────────────────────────────
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/nexus_logo.png
  image_dark: assets/images/nexus_logo.png
  color_dark: "#FFFFFF"
  android_12:
    image: assets/images/nexus_logo.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/images/nexus_logo.png
    icon_background_color_dark: "#FFFFFF"
  fullscreen: false
  android: true
  ios: true
